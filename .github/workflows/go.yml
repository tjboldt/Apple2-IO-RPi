name: Go

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Build
      run: cd RaspberryPi/apple2driver;go build -v ./...

    - name: Test
      run: cd RaspberryPi/apple2driver;go test -v ./...
